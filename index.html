<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime Library</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🌸 Anime Library</h1>
    <div class="header-actions">
      <button id="btn-export" class="btn-secondary">Экспорт</button>
      <label class="btn-secondary" title="Импорт из файла">Импорт<input type="file" id="btn-import" accept=".json" hidden /></label>
      <button id="btn-sync-settings" class="btn-secondary" title="Настройки синхронизации">☁️</button>
      <button id="btn-add" class="btn-primary">+ Добавить аниме</button>
    </div>
  </header>

  <section class="filters">
    <input type="text" id="search" placeholder="Поиск по названию…" />
    <div class="status-chips">
      <button class="chip active" data-status="">Все</button>
      <button class="chip" data-status="completed">Завершён</button>
      <button class="chip" data-status="ongoing">Онгоинг</button>
      <button class="chip" data-status="dropped">Брошен</button>
      <button class="chip" data-status="planned">Буду смотреть</button>
    </div>
    <div id="tag-filters" class="tag-filters"></div>
  </section>

  <main id="grid" class="grid"></main>

  <p id="empty-state" class="empty-state" hidden>Пока ничего нет. Добавь первое аниме!</p>

  <!-- Modal -->
  <div id="modal" class="modal" hidden>
    <div class="modal-box">
      <button class="modal-close" id="btn-close">✕</button>
      <h2 id="modal-title">Новое аниме</h2>

      <label>Название *
        <div class="title-search-wrap">
          <input type="text" id="f-title" placeholder="Название аниме" autocomplete="off" />
          <div id="search-results" class="search-results" hidden></div>
        </div>
      </label>

      <div id="cover-preview" class="cover-preview" hidden>
        <img id="cover-img" src="" alt="обложка" />
        <button id="btn-clear-cover" type="button">✕ убрать</button>
      </div>

      <label>Оценка: <span id="rating-val">—</span>
        <div class="stars" id="stars"></div>
      </label>

      <label>Статус
        <select id="f-status">
          <option value="completed">Завершён</option>
          <option value="ongoing">Онгоинг</option>
          <option value="dropped">Брошен</option>
          <option value="planned">Буду смотреть</option>
        </select>
      </label>

      <label>Теги
        <div id="preset-tags" class="preset-tags"></div>
        <div class="tag-input-wrap">
          <div id="tag-list" class="tag-list"></div>
          <input type="text" id="f-tag" placeholder="Свой тег — нажми Enter…" />
        </div>
      </label>

      <label>Заметки / мысли
        <textarea id="f-notes" rows="5" placeholder="Впечатления, любимые моменты, советы…"></textarea>
      </label>

      <div class="modal-actions">
        <button id="btn-delete" class="btn-danger" hidden>Удалить</button>
        <button id="btn-save" class="btn-primary">Сохранить</button>
      </div>
    </div>
  </div>
  <!-- Sync settings modal -->
  <div id="sync-modal" class="modal" hidden>
    <div class="modal-box">
      <button class="modal-close" id="btn-sync-close">✕</button>
      <h2>☁️ Синхронизация</h2>
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:16px">
        Данные хранятся в приватном GitHub Gist — доступны на всех устройствах.<br>
        Токен вводится один раз на каждом новом устройстве.
      </p>
      <label>GitHub Token
        <input type="password" id="sync-token" placeholder="ghp_…" autocomplete="off" />
      </label>
      <div id="sync-status" class="sync-status"></div>
      <div class="modal-actions">
        <button id="btn-sync-disconnect" class="btn-danger" hidden>Отключить</button>
        <button id="btn-sync-connect" class="btn-primary">Подключить</button>
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay" hidden></div>

  <script src="app.js"></script>
</body>
</html>
